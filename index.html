<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考試監考時數及加時計算工具</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --highlight-bg: #eff6ff;
            --warning-bg: #fef9c3;
            --warning-text: #854d0e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            max-width: 500px;
            width: 100%;
            padding: 24px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }

        select {
            padding: 10px 12px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s, background-color 0.2s;
            background-color: #fff;
        }

        select:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        select:disabled {
            background-color: #f1f5f9;
            color: var(--text-muted);
            cursor: not-allowed;
            border-color: var(--border-color);
        }

        /* 時間下拉選單組合樣式 */
        .time-select-container {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .time-select-container select {
            flex: 1;
            text-align: center;
        }

        .time-separator {
            font-weight: bold;
            color: var(--text-muted);
        }

        .time-row {
            display: flex;
            gap: 16px;
        }

        .time-row .form-group {
            flex: 1;
        }

        .notice {
            font-size: 0.85rem;
            color: var(--warning-text);
            background-color: var(--warning-bg);
            padding: 8px 12px;
            border-radius: 6px;
            margin-top: -8px;
            margin-bottom: 16px;
            display: none;
        }

        .result-box {
            margin-top: 24px;
            background-color: var(--highlight-bg);
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            padding: 16px;
        }

        .result-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 12px;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .result-item {
            background: var(--card-bg);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
        }

        .result-label {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .result-value {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .result-value.highlight {
            color: #dc2626;
        }

        .breakdown {
            margin-top: 12px;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px dashed #93c5fd;
            padding-top: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 考試時間計算器 </h1>

    <div class="form-group">
        <label for="sessionSelect">1. 選擇節次</label>
        <select id="sessionSelect" style="width: 100%;">
            <option value="1">第一節</option>
            <option value="2">第二或第三節</option>
        </select>
    </div>

    <div id="session1Notice" class="notice" style="display: block;">
        ⚠️ 第一節原訂開考時間已鎖定為 08:30。
    </div>

    <div class="time-row">
        <div class="form-group">
            <label>2. 原訂開考時間</label>
            <div class="time-select-container">
                <select id="startHour" disabled></select>
                <span class="time-separator">:</span>
                <select id="startMinute" disabled></select>
            </div>
        </div>
        
        <div class="form-group">
            <label>原訂完卷時間</label>
            <div class="time-select-container">
                <select id="endHour"></select>
                <span class="time-separator">:</span>
                <select id="endMinute"></select>
            </div>
        </div>
    </div>

    <div class="result-box" id="resultBox">
        <div class="result-title">
            <span>3. 自動計算結果</span>
            <span id="totalDurationBadge" style="font-size: 0.85rem; background: #2563eb; color: #fff; padding: 2px 8px; border-radius: 12px;">原訂: 0 分鐘</span>
        </div>
        
        <div class="result-grid">
            <div class="result-item">
                <div class="result-label">實際開考時間 (加時後)</div>
                <div class="result-value highlight" id="newStartTime">--:--</div>
            </div>
            <div class="result-item">
                <div class="result-label">實際完卷時間 (加時後)</div>
                <div class="result-value highlight" id="newEndTime">--:--</div>
            </div>
            <div class="result-item">
                <div class="result-label">總考試時間 (1.25倍)</div>
                <div class="result-value" id="newTotalDuration">0 分鐘</div>
            </div>
            <div class="result-item">
                <div class="result-label">額外加時</div>
                <div class="result-value" id="extraMinutes">+0 分鐘</div>
            </div>
        </div>

        <div class="breakdown" id="breakdownText">
            請選擇有效時間。
        </div>
    </div>
</div>

<script>
    const sessionSelect = document.getElementById('sessionSelect');
    const startHourSelect = document.getElementById('startHour');
    const startMinuteSelect = document.getElementById('startMinute');
    const endHourSelect = document.getElementById('endHour');
    const endMinuteSelect = document.getElementById('endMinute');
    const session1Notice = document.getElementById('session1Notice');

    const newStartTimeEl = document.getElementById('newStartTime');
    const newEndTimeEl = document.getElementById('newEndTime');
    const newTotalDurationEl = document.getElementById('newTotalDuration');
    const extraMinutesEl = document.getElementById('extraMinutes');
    const totalDurationBadge = document.getElementById('totalDurationBadge');
    const breakdownText = document.getElementById('breakdownText');

    // 初始化：動態生成小時與分鐘選單內容 (考試時間設定在 06:00 ~ 21:00 之間較為合理)
    function initTimeDropdowns() {
        // 生成小時 (06 至 21)
        for (let h = 6; h <= 21; h++) {
            const hStr = String(h).padStart(2, '0');
            startHourSelect.add(new Option(hStr, hStr));
            endHourSelect.add(new Option(hStr, hStr));
        }
        // 生成分鐘 (00 至 59)
        for (let m = 0; m < 60; m+=5) {
            const mStr = String(m).padStart(2, '0');
            startMinuteSelect.add(new Option(mStr, mStr));
            endMinuteSelect.add(new Option(mStr, mStr));
        }

        // 設定預設值
        startHourSelect.value = '08';
        startMinuteSelect.value = '30';
        endHourSelect.value = '09';
        endMinuteSelect.value = '45';
    }

    // 監聽選單變更事件
    sessionSelect.addEventListener('change', handleSessionChange);
    startHourSelect.addEventListener('change', calculateTime);
    startMinuteSelect.addEventListener('change', calculateTime);
    endHourSelect.addEventListener('change', calculateTime);
    endMinuteSelect.addEventListener('change', calculateTime);

    function handleSessionChange() {
        if (sessionSelect.value === '1') {
            // 第一節：鎖定 08:30 並禁用選單
            startHourSelect.value = '08';
            startMinuteSelect.value = '30';
            startHourSelect.disabled = true;
            startMinuteSelect.disabled = true;
            session1Notice.style.display = 'block';
        } else {
            // 第二/三節：解除禁用狀態
            startHourSelect.disabled = false;
            startMinuteSelect.disabled = false;
            session1Notice.style.display = 'none';
        }
        calculateTime();
    }

    // 將總分鐘數轉換回 HH:MM 格式
    function minutesToTime(totalMinutes) {
        totalMinutes = ((totalMinutes % 1440) + 1440) % 1440;
        const hours = Math.floor(totalMinutes / 60);
        const minutes = totalMinutes % 60;
        return `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
    }

    function calculateTime() {
        // 從選單獲取當前分鐘數
        const startMins = parseInt(startHourSelect.value, 10) * 60 + parseInt(startMinuteSelect.value, 10);
        const endMins = parseInt(endHourSelect.value, 10) * 60 + parseInt(endMinuteSelect.value, 10);
        
        let originalDuration = endMins - startMins;

        // 若完卷時間早於或等於開考時間
        if (originalDuration <= 0) {
            newStartTimeEl.textContent = '--:--';
            newEndTimeEl.textContent = '--:--';
            newTotalDurationEl.textContent = '0 分鐘';
            extraMinutesEl.textContent = '+0 分鐘';
            totalDurationBadge.textContent = '原訂: 0 分鐘';
            breakdownText.textContent = '⚠️ 錯誤：完卷時間必須晚於開考時間。';
            return;
        }

        // 1. 總分鐘 * 1.25，並上捨入至分鐘
        const newTotalDuration = Math.ceil(originalDuration * 1.25);
        const extraMins = newTotalDuration - originalDuration;

        let newStartMins = startMins;
        let newEndMins = endMins;
        let breakdownMsg = '';

        // 加時邏輯分支
        if (sessionSelect.value === '1') {
            // 第一節原則：加在原訂開考前，若早於 08:00 (480分鐘) 則將剩餘加在完卷後
            const minStartLimit = 8 * 60; // 08:00
            const maxBeforeMins = startMins - minStartLimit; // 在 08:30 情況下，最多只能往前加 30 分鐘

            if (extraMins <= maxBeforeMins) {
                newStartMins = startMins - extraMins;
                breakdownMsg = `💡 根據第一節原則，所有額外時間 (${extraMins} 分鐘) 皆加在原訂開考時間之前。`;
            } else {
                newStartMins = minStartLimit; // 鎖定在 08:00
                const afterMins = extraMins - maxBeforeMins;
                newEndMins = endMins + afterMins;
                breakdownMsg = `💡 根據第一節原則，開考前最多提前至 08:00 (已加 ${maxBeforeMins} 分鐘)，剩餘的 ${afterMins} 分鐘已順延至完卷時間後。`;
            }
        } else {
            // 第二或第三節原則：必定加在原訂完卷時間後
            newEndMins = endMins + extraMins;
            breakdownMsg = `💡 根據第二/三節原則，所有額外時間 (${extraMins} 分鐘) 皆直接加在原訂完卷時間之後。`;
        }

        // 更新介面顯示
        totalDurationBadge.textContent = `原訂: ${originalDuration} 分鐘`;
        newStartTimeEl.textContent = minutesToTime(newStartMins);
        newEndTimeEl.textContent = minutesToTime(newEndMins);
        newTotalDurationEl.textContent = `${newTotalDuration} 分鐘`;
        extraMinutesEl.textContent = `+${extraMins} 分鐘`;
        breakdownText.textContent = breakdownMsg;
    }

    // 初始化載入
    initTimeDropdowns();
    calculateTime();
</script>

</body>
</html>
